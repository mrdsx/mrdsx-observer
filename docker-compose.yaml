services:
  firebase:
    build: firebase
    ports:
      - "4000:4000"
      - "8080:8080"

  frontend:
    build: frontend
    ports:
      - "3000:3000"

  backend:
    build: backend
    ports:
      - "8000:8000"
    environment:
      - FIRESTORE_EMULATOR_HOST=firebase:8080
    env_file:
      - ./backend/.env
