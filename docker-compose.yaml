services:
  frontend:
    build: frontend
    ports:
      - "3010:3000"
    environment:
      PUBLIC_ENV__API_URL: "http://localhost:8010"

  backend:
    build: backend
    ports:
      - "8010:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  firebase:
    build: firebase
    ports:
      - "4000:4000"
      - "8080:8080"

  redis:
    image: redis:8.6.2-alpine
    container_name: my-redis
    restart: always
